<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Calories" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>Calorie Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 id="header-title">Today</h1>
      <div class="sub" id="header-sub"></div>
    </header>

    <!-- OVERVIEW -->
    <section id="view-overview" class="view active">
      <div class="card">
        <div class="ring-wrap">
          <div class="ring">
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="56" stroke="var(--line)" stroke-width="12" fill="none"/>
              <circle id="ring-progress" cx="65" cy="65" r="56" stroke="var(--cal)" stroke-width="12"
                      fill="none" stroke-linecap="round" stroke-dasharray="351.9" stroke-dashoffset="351.9"/>
            </svg>
            <div class="center">
              <div class="big" id="ov-cal">0</div>
              <div class="small" id="ov-cal-goal">of 2000 kcal</div>
            </div>
          </div>
          <div class="ring-stats">
            <div class="ring-stat"><span class="k">Consumed</span><span class="v" id="ov-consumed">0 kcal</span></div>
            <div class="ring-stat"><span class="k">Remaining</span><span class="v" id="ov-remaining">2000 kcal</span></div>
            <div class="ring-stat"><span class="k">Goal</span><span class="v"><button class="link-btn" id="edit-goal">Edit goal</button></span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Macronutrients</h2>
        <div class="macros">
          <div class="macro">
            <div class="bar"><span class="dot-pro" id="bar-pro"></span></div>
            <div class="label">Protein</div>
            <div class="val" id="ov-pro">0<small>g</small></div>
          </div>
          <div class="macro">
            <div class="bar"><span class="dot-carb" id="bar-carb"></span></div>
            <div class="label">Carbs</div>
            <div class="val" id="ov-carb">0<small>g</small></div>
          </div>
          <div class="macro">
            <div class="bar"><span class="dot-fat" id="bar-fat"></span></div>
            <div class="label">Fat</div>
            <div class="val" id="ov-fat">0<small>g</small></div>
          </div>
        </div>
      </div>

      <div class="card" id="water-card">
        <div class="card-title-row" style="margin-bottom:14px;">
          <h2>Water</h2>
          <span class="water-count"><b id="ov-water">0</b> / <span id="ov-water-goal">2000</span> ml</span>
        </div>
        <div class="water-bar"><span id="water-fill"></span></div>
        <div class="water-actions">
          <button data-ml="250">+250 ml</button>
          <button data-ml="500">+500 ml</button>
          <button data-ml="-250" class="minus">−250</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title-row" style="margin-bottom:14px;">
          <h2>Today's food</h2>
          <button class="link-btn" id="goto-input">+ Add</button>
        </div>
        <div id="ov-entries"></div>
      </div>
    </section>

    <!-- HISTORY -->
    <section id="view-history" class="view">
      <div class="card">
        <div class="card-title-row" style="margin-bottom:14px;">
          <h2 id="hist-title">Last 7 days</h2>
          <div class="chart-tabs" id="range-tabs" style="margin-bottom:0;">
            <button class="chip active" data-range="7">7d</button>
            <button class="chip" data-range="30">30d</button>
          </div>
        </div>
        <div class="chart-tabs" id="chart-tabs">
          <button class="chip active" data-metric="kcal">Calories</button>
          <button class="chip" data-metric="protein">Protein</button>
          <button class="chip" data-metric="carbs">Carbs</button>
          <button class="chip" data-metric="fat">Fat</button>
          <button class="chip" data-metric="water">Water</button>
        </div>
        <div class="hist-summary">
          <span class="k">Daily average</span>
          <span class="v" id="hist-avg">0</span>
        </div>
        <div class="chart-plot" id="hist-bars"></div>
        <div class="chart-labels" id="hist-labels"></div>
        <div class="chart-legend"><span class="dash"></span> Goal <b id="hist-goal">—</b></div>
      </div>
      <div class="card">
        <h2>Daily log</h2>
        <div id="hist-days"></div>
      </div>
    </section>

    <!-- INPUT -->
    <section id="view-input" class="view">
      <div class="card">
        <h2>Add food</h2>
        <div class="search-box">
          <input type="search" id="search" placeholder="Search foods…" autocomplete="off" />
        </div>
        <div class="results" id="results"></div>
        <button class="btn ghost" id="add-custom" style="margin-top:12px;">+ Add a custom food</button>
      </div>
    </section>

    <!-- FOODS / DATABASE -->
    <section id="view-foods" class="view">
      <div class="card">
        <h2>Food database</h2>
        <button class="btn" id="scan-food" style="margin-bottom:10px;">📷 Scan package</button>
        <div class="db-actions">
          <button class="btn secondary" id="create-meal">🍲 New meal</button>
          <button class="btn secondary" id="add-food-manual">✏️ New food</button>
        </div>
        <div class="search-box" style="margin-top:14px;">
          <input type="search" id="db-search" placeholder="Search foods & meals…" autocomplete="off" />
        </div>
        <div id="meal-list"></div>
        <div class="db-count" id="db-count"></div>
        <div id="db-list"></div>
      </div>
    </section>

    <!-- BOTTOM NAV -->
    <nav class="tabbar">
      <button class="tab active" data-view="overview">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 12V6"/><path d="M12 12l4 2.5"/></svg>
        Overview
      </button>
      <button class="tab" data-view="history">
        <svg viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M3 20h18"/></svg>
        History
      </button>
      <button class="tab" data-view="input">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
        Input
      </button>
      <button class="tab" data-view="foods">
        <svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
        Foods
      </button>
    </nav>
  </div>

  <!-- Quantity / add sheet -->
  <div class="sheet-backdrop" id="sheet">
    <div class="sheet" id="sheet-content"></div>
  </div>

  <!-- Scan overlay (camera) -->
  <div class="scan-overlay" id="scan-overlay">
    <div class="scan-head">
      <button id="scan-close" aria-label="Close">✕</button>
      <span>Scan package</span>
    </div>
    <div id="scan-reader"></div>
    <div class="scan-status" id="scan-status">Starting camera…</div>
    <div class="scan-foot">
      <button class="btn secondary" id="scan-photo">📄 Photograph the label instead</button>
      <div class="scan-manual">
        <input type="text" inputmode="numeric" id="scan-manual" placeholder="…or type the barcode digits" />
        <button class="btn" id="scan-manual-go">Look up</button>
      </div>
      <input type="file" id="ocr-file" accept="image/*" capture="environment" hidden />
    </div>
  </div>

  <script src="foods.js"></script>
  <script src="app.js"></script>
</body>
</html>
